<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Le CFO masqué">
  <!-- Background rectangle -->
  <rect x="100" y="30" width="290" height="210" rx="6" fill="#2a2a2a"/>

  <!-- Text "LE CFO" -->
  <text x="245" y="112" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif"
        font-size="50" font-weight="900" fill="#ffffff" letter-spacing="2">LE CFO</text>
  <!-- Text "MASQUÉ" -->
  <text x="245" y="180" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif"
        font-size="52" font-weight="900" fill="#ffffff" letter-spacing="2">MASQUÉ</text>

  <!-- Mascot (simplified superhero with mask) -->
  <g transform="translate(10,15)">
    <!-- Cape (behind body) -->
    <path d="M 38,120 Q 20,160 15,220 Q 40,210 55,180 Q 62,150 60,130 Z" fill="#1a4b8f"/>
    <path d="M 95,120 Q 110,170 115,215 Q 95,210 80,180 Q 75,150 75,130 Z" fill="#1a4b8f"/>

    <!-- Legs -->
    <rect x="53" y="155" width="12" height="55" fill="#2672c8"/>
    <rect x="73" y="155" width="12" height="55" fill="#2672c8"/>
    <!-- Boots -->
    <ellipse cx="59" cy="218" rx="10" ry="5" fill="#1a1a1a"/>
    <ellipse cx="79" cy="218" rx="10" ry="5" fill="#1a1a1a"/>

    <!-- Body / torso -->
    <path d="M 40,90 Q 40,80 50,78 L 88,78 Q 98,80 98,90 L 98,160 L 40,160 Z" fill="#2672c8"/>
    <!-- Belt -->
    <rect x="38" y="150" width="62" height="9" fill="#1a1a1a"/>
    <rect x="65" y="148" width="8" height="13" fill="#d4a017"/>
    <!-- CFO chest emblem -->
    <circle cx="69" cy="110" r="15" fill="#ffffff"/>
    <text x="69" y="115" text-anchor="middle" font-family="Arial Black,sans-serif"
          font-size="10" font-weight="900" fill="#2672c8">CFO</text>

    <!-- Right arm (on hip) -->
    <path d="M 90,92 Q 110,95 112,115 Q 110,130 98,128 L 95,115 Z" fill="#2672c8"/>
    <!-- Hand -->
    <circle cx="97" cy="126" r="6" fill="#f4c9a0"/>

    <!-- Left arm (visible by side) -->
    <path d="M 40,90 Q 30,100 32,135 L 42,135 Q 44,110 48,95 Z" fill="#2672c8"/>
    <circle cx="36" cy="138" r="6" fill="#f4c9a0"/>

    <!-- Neck -->
    <rect x="60" y="70" width="18" height="12" fill="#f4c9a0"/>

    <!-- Head -->
    <ellipse cx="69" cy="58" rx="22" ry="25" fill="#f4c9a0"/>

    <!-- Curly hair (orange) -->
    <circle cx="55" cy="38" r="8" fill="#e87c2c"/>
    <circle cx="68" cy="32" r="9" fill="#e87c2c"/>
    <circle cx="82" cy="38" r="8" fill="#e87c2c"/>
    <circle cx="88" cy="52" r="7" fill="#e87c2c"/>
    <circle cx="50" cy="50" r="6" fill="#e87c2c"/>

    <!-- Mask (blue domino mask over eyes) -->
    <path d="M 50,54 Q 48,48 55,47 L 83,47 Q 90,48 88,54 L 88,62 Q 88,68 82,68 L 76,68 Q 72,66 70,63 Q 68,66 62,68 L 56,68 Q 50,68 50,62 Z" fill="#2672c8"/>
    <!-- Eye holes -->
    <ellipse cx="60" cy="58" rx="3.5" ry="3" fill="#1a1a1a"/>
    <ellipse cx="78" cy="58" rx="3.5" ry="3" fill="#1a1a1a"/>
    <!-- Side ties -->
    <path d="M 48,56 L 42,54 L 42,60 Z" fill="#2672c8"/>
    <path d="M 90,56 L 96,54 L 96,60 Z" fill="#2672c8"/>

    <!-- Mouth (small smile) -->
    <path d="M 62,78 Q 69,82 76,78" stroke="#8b4513" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M 69,68 Q 72,72 69,74" stroke="#d4a68a" stroke-width="1.2" fill="none"/>
  </g>
</svg>
